# Full PDFForge stack: web + api + postgres + redis + minio.
# `docker compose -f infra/docker/docker-compose.yml up` boots everything.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pdfforge
      POSTGRES_PASSWORD: pdfforge
      POSTGRES_DB: pdfforge
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      API_PORT: 3001
      DATABASE_URL: postgresql://pdfforge:pdfforge@postgres:5432/pdfforge
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    ports: ["3001:3001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    environment:
      API_INTERNAL_URL: http://api:3001
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
  miniodata:
